<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SouTaxToken 部署器</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.1/dist.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="file"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: #f5f5f5;
            border: 2px dashed #ddd;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            font-weight: 500;
        }

        .file-input-label:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .file-name {
            color: #667eea;
            font-weight: 600;
            margin-top: 8px;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .alert {
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1565c0;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .alert-warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #e65100;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #666;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
        }

        .stat-value {
            color: #333;
            font-weight: 500;
            word-break: break-all;
        }

        .helper-text {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .result-section {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            font-weight: 600;
            color: #333;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .result-value {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            word-break: break-all;
            font-size: 12px;
            color: #666;
            background: white;
            padding: 8px;
            border-radius: 4px;
        }

        .copy-btn {
            display: inline-block;
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 8px;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-connected {
            background: #2e7d32;
        }

        .status-disconnected {
            background: #c62828;
        }

        .status-warning {
            background: #e65100;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SouTaxToken 部署器</h1>
        <p class="subtitle">通过 Flap 协议在 BSC 主网上部署税收代币</p>

        <div id="alertContainer"></div>

        <form id="deployForm">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">
                        <span class="status-indicator" id="walletStatusIndicator"></span>
                        钱包状态
                    </span>
                    <span class="stat-value" id="walletStatus">未连接</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">
                        <span class="status-indicator" id="networkStatusIndicator"></span>
                        网络
                    </span>
                    <span class="stat-value" id="networkStatus">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">SOU 余额</span>
                    <span class="stat-value" id="souBalance">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">BNB 余额</span>
                    <span class="stat-value" id="bnbBalance">-</span>
                </div>
            </div>

            <div class="form-group">
                <label for="tokenName">代币名称 *</label>
                <input type="text" id="tokenName" placeholder="例如：My Tax Token" required>
                <div class="helper-text">代币的完整名称</div>
            </div>

            <div class="form-group">
                <label for="tokenSymbol">代币符号 *</label>
                <input type="text" id="tokenSymbol" placeholder="例如：MTT" maxlength="10" required>
                <div class="helper-text">代币的缩写符号（通常 3-5 个字符）</div>
            </div>

            <div class="form-group">
                <label for="tokenDescription">代币描述 *</label>
                <textarea id="tokenDescription" placeholder="描述您的代币的用途和特点" required></textarea>
                <div class="helper-text">简要描述代币的功能和特点</div>
            </div>

            <div class="form-group">
                <label for="tokenLogo">代币 Logo *</label>
                <div class="file-input-wrapper">
                    <input type="file" id="tokenLogo" accept="image/png,image/jpeg,image/gif" required>
                    <label for="tokenLogo" class="file-input-label">
                        📁 点击选择或拖拽 Logo 文件
                    </label>
                    <div class="file-name" id="fileName"></div>
                </div>
                <div class="helper-text">支持 PNG、JPEG、GIF 格式，建议 512x512 像素</div>
            </div>

            <div class="form-group">
                <label for="website">官网 URL</label>
                <input type="text" id="website" placeholder="https://example.com">
                <div class="helper-text">可选，您的项目官网地址</div>
            </div>

            <div class="form-group">
                <label for="twitter">Twitter</label>
                <input type="text" id="twitter" placeholder="https://twitter.com/yourhandle">
                <div class="helper-text">可选，您的 Twitter 账户链接</div>
            </div>

            <div class="form-group">
                <label for="telegram">Telegram</label>
                <input type="text" id="telegram" placeholder="https://t.me/yourchannel">
                <div class="helper-text">可选，您的 Telegram 频道链接</div>
            </div>

            <div class="form-group">
                <label for="marketingWallet">营销钱包地址 *</label>
                <input type="text" id="marketingWallet" placeholder="0xa819Eaf3f1d79E03a6D1001818889655532A9150" value="0xa819Eaf3f1d79E03a6D1001818889655532A9150" required>
                <div class="helper-text">接收 100% 税收的钱包地址</div>
            </div>

            <div class="form-group">
                <label for="devFee">开发者份额 (BNB) *</label>
                <input type="number" id="devFee" placeholder="0.1" step="0.001" min="0.001" required>
                <div class="helper-text">开发者需要支付的 BNB 份额</div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" id="connectBtn">连接钱包</button>
                <button type="submit" class="btn-primary" id="deployBtn" disabled>部署代币</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">处理中...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-item">
                <div class="result-label">元数据 CID</div>
                <div class="result-value" id="resultCid">-</div>
                <button class="copy-btn" onclick="copyToClipboard('resultCid')">复制</button>
            </div>
            <div class="result-item">
                <div class="result-label">计算的 Salt</div>
                <div class="result-value" id="resultSalt">-</div>
                <button class="copy-btn" onclick="copyToClipboard('resultSalt')">复制</button>
            </div>
            <div class="result-item">
                <div class="result-label">预期代币地址</div>
                <div class="result-value" id="resultAddress">-</div>
                <button class="copy-btn" onclick="copyToClipboard('resultAddress')">复制</button>
            </div>
            <div class="result-item">
                <div class="result-label">部署交易哈希</div>
                <div class="result-value" id="resultTxHash">-</div>
                <button class="copy-btn" onclick="copyToClipboard('resultTxHash')">复制</button>
            </div>
        </div>
    </div>

    <script>
        const FLAP_UPLOAD_API = 'https://funcs.flap.sh/api/upload';
        const PORTAL_ADDRESS = '0xe2cE6ab80874Fa9Fa2aAE65D277Dd6B8e65C9De0';
        const TAX_TOKEN_V1_IMPL = '0x29e6383F0ce68507b5A72a53c2B118a118332aA8';
        const FACTORY_ADDRESS = '0x82768dCD5b4df30247A6B816a101c3D93a8a9779';
        const SOU_TOKEN_ADDRESS = '0x9B5F27f6ea9bBD753ce3793a07CbA3cAC3f3023d';
        const SOU_FEE = ethers.parseEther('10000');

        const FACTORY_ABI = [
            'function deployNewToken(tuple(string name, string symbol, string meta, uint8 dexThresh, bytes32 salt, uint16 taxRate, uint8 migratorType, address quoteToken, uint256 quoteAmt, address beneficiary, bytes permitData, bytes32 extensionID, bytes extensionData, uint8 dexId, tuple(uint24 fee, int24 tickLower, int24 tickUpper) lpFeeProfile, uint64 taxDuration, uint64 antiFarmerDuration, uint16 mktBps, uint16 deflationBps, uint16 dividendBps, uint16 lpBps, uint256 minimumShareBalance) params) payable returns (address)'
        ];

        const SOU_ABI = [
            'function approve(address spender, uint256 amount) returns (bool)',
            'function balanceOf(address account) view returns (uint256)',
            'function allowance(address owner, address spender) view returns (uint256)'
        ];

        let provider, signer, userAddress;

        async function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} show`;
            alertDiv.textContent = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            setTimeout(() => alertDiv.classList.remove('show'), 5000);
        }

        async function connectWallet() {
            try {
                if (typeof window.ethereum === 'undefined') {
                    showAlert('请安装 MetaMask 或其他 Web3 钱包扩展', 'error');
                    return;
                }

                console.log('开始连接钱包...');
                
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts' 
                });

                if (!accounts || accounts.length === 0) {
                    showAlert('未能获取账户，请重试', 'error');
                    return;
                }

                userAddress = accounts[0];
                console.log('已连接账户:', userAddress);

                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();

                const network = await provider.getNetwork();
                console.log('网络 ID:', network.chainId);

                if (network.chainId !== 56n) {
                    showAlert('请切换到 BSC 主网（Chain ID: 56）', 'warning');
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x38' }],
                        });
                        showAlert('已切换到 BSC 主网', 'success');
                    } catch (switchError) {
                        console.error('切换网络失败:', switchError);
                        showAlert('切换网络失败，请手动切换到 BSC 主网', 'error');
                        return;
                    }
                }

                await updateWalletStatus();
                document.getElementById('deployBtn').disabled = false;
                showAlert('钱包已连接', 'success');
            } catch (error) {
                console.error('连接钱包错误:', error);
                showAlert('连接钱包失败: ' + error.message, 'error');
            }
        }

        async function updateWalletStatus() {
            if (!userAddress || !provider) return;

            try {
                document.getElementById('walletStatus').textContent = userAddress.substring(0, 6) + '...' + userAddress.substring(38);
                document.getElementById('walletStatusIndicator').className = 'status-indicator status-connected';

                const network = await provider.getNetwork();
                if (network.chainId === 56n) {
                    document.getElementById('networkStatus').textContent = 'BSC 主网';
                    document.getElementById('networkStatusIndicator').className = 'status-indicator status-connected';
                } else {
                    document.getElementById('networkStatus').textContent = '非 BSC 主网';
                    document.getElementById('networkStatusIndicator').className = 'status-indicator status-warning';
                }

                const souContract = new ethers.Contract(SOU_TOKEN_ADDRESS, SOU_ABI, provider);
                const souBalance = await souContract.balanceOf(userAddress);
                document.getElementById('souBalance').textContent = ethers.formatEther(souBalance) + ' SOU';

                const bnbBalance = await provider.getBalance(userAddress);
                document.getElementById('bnbBalance').textContent = ethers.formatEther(bnbBalance) + ' BNB';
            } catch (e) {
                console.error('更新钱包状态失败:', e);
                document.getElementById('souBalance').textContent = '获取失败';
                document.getElementById('bnbBalance').textContent = '获取失败';
            }
        }

        async function uploadMetadata(file, name, symbol, description, website, twitter, telegram) {
            try {
                const formData = new FormData();

                const mutation = `
                    mutation Create($file: Upload!, $meta: MetadataInput!) {
                        create(file: $file, meta: $meta)
                    }
                `;

                formData.append('operations', JSON.stringify({
                    query: mutation,
                    variables: {
                        file: null,
                        meta: {
                            website: website || null,
                            twitter: twitter || null,
                            telegram: telegram || null,
                            description: description,
                            creator: '0x0000000000000000000000000000000000000000'
                        }
                    }
                }));

                formData.append('map', JSON.stringify({
                    '0': ['variables.file']
                }));

                formData.append('0', file);

                const response = await fetch(FLAP_UPLOAD_API, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`上传失败: ${response.statusText}`);
                }

                const data = await response.json();
                if (data.errors) {
                    throw new Error(data.errors[0].message);
                }

                return data.data.create;
            } catch (error) {
                throw new Error('元数据上传失败: ' + error.message);
            }
        }

        function predictTokenAddress(salt, tokenImpl, portal) {
            const bytecode = '0x3d602d80600a3d3981f3363d3d373d3d3d363d73' +
                tokenImpl.slice(2).toLowerCase() +
                '5af43d82803e903d91602b57fd5bf3';

            const hash = ethers.solidityPacked(
                ['bytes1', 'address', 'bytes32', 'bytes32'],
                ['0xff', portal, salt, ethers.keccak256(bytecode)]
            );

            return '0x' + ethers.keccak256(hash).slice(-40);
        }

        async function findVanitySalt(suffix = '7777') {
            let iterations = 0;
            let seed = ethers.randomBytes(32);
            let salt = ethers.keccak256(seed);

            while (!predictTokenAddress(salt, TAX_TOKEN_V1_IMPL, PORTAL_ADDRESS).endsWith(suffix)) {
                salt = ethers.keccak256(salt);
                iterations++;
                if (iterations % 1000 === 0) {
                    document.getElementById('loadingText').textContent = `计算 Salt... (${iterations} 次迭代)`;
                }
            }

            return {
                salt,
                address: predictTokenAddress(salt, TAX_TOKEN_V1_IMPL, PORTAL_ADDRESS),
                iterations
            };
        }

        async function handleDeploy(e) {
            e.preventDefault();

            if (!userAddress) {
                showAlert('请先连接钱包', 'warning');
                return;
            }

            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('deployForm').style.display = 'none';
                document.getElementById('resultSection').classList.remove('show');

                const name = document.getElementById('tokenName').value;
                const symbol = document.getElementById('tokenSymbol').value;
                const description = document.getElementById('tokenDescription').value;
                const website = document.getElementById('website').value;
                const twitter = document.getElementById('twitter').value;
                const telegram = document.getElementById('telegram').value;
                const marketingWallet = document.getElementById('marketingWallet').value;
                const devFee = ethers.parseEther(document.getElementById('devFee').value);
                const logoFile = document.getElementById('tokenLogo').files[0];

                if (!ethers.isAddress(marketingWallet)) {
                    throw new Error('营销钱包地址无效');
                }

                document.getElementById('loadingText').textContent = '上传元数据到 IPFS...';
                const cid = await uploadMetadata(logoFile, name, symbol, description, website, twitter, telegram);
                console.log('CID:', cid);

                document.getElementById('loadingText').textContent = '计算 Salt...';
                const { salt, address, iterations } = await findVanitySalt('7777');
                console.log('Salt:', salt, 'Address:', address, 'Iterations:', iterations);

                document.getElementById('loadingText').textContent = '检查 SOU 授权...';
                const souContract = new ethers.Contract(SOU_TOKEN_ADDRESS, SOU_ABI, signer);
                const allowance = await souContract.allowance(userAddress, FACTORY_ADDRESS);
                if (allowance < SOU_FEE) {
                    document.getElementById('loadingText').textContent = '授权 SOU 代币...';
                    const approveTx = await souContract.approve(FACTORY_ADDRESS, ethers.MaxUint256);
                    await approveTx.wait();
                }

                document.getElementById('loadingText').textContent = '部署代币...';
                const factoryContract = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, signer);

                const params = {
                    name,
                    symbol,
                    meta: cid,
                    dexThresh: 1,
                    salt,
                    taxRate: 300,
                    migratorType: 2,
                    quoteToken: ethers.ZeroAddress,
                    quoteAmt: 0,
                    beneficiary: marketingWallet,
                    permitData: '0x',
                    extensionID: ethers.ZeroHash,
                    extensionData: '0x',
                    dexId: 1,
                    lpFeeProfile: {
                        fee: 0,
                        tickLower: 0,
                        tickUpper: 0
                    },
                    taxDuration: 0n,
                    antiFarmerDuration: 0n,
                    mktBps: 10000,
                    deflationBps: 0,
                    dividendBps: 0,
                    lpBps: 0,
                    minimumShareBalance: 0n
                };

                const deployTx = await factoryContract.deployNewToken(params, { value: devFee });
                const receipt = await deployTx.wait();

                document.getElementById('resultCid').textContent = cid;
                document.getElementById('resultSalt').textContent = salt;
                document.getElementById('resultAddress').textContent = address;
                document.getElementById('resultTxHash').textContent = receipt.hash;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultSection').classList.add('show');
                showAlert('代币部署成功！', 'success');
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('deployForm').style.display = 'block';
                showAlert('部署失败: ' + error.message, 'error');
                console.error(error);
            }
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(() => {
                showAlert('已复制到剪贴板', 'success');
            });
        }

        document.getElementById('connectBtn').addEventListener('click', connectWallet);
        document.getElementById('deployForm').addEventListener('submit', handleDeploy);

        document.getElementById('tokenLogo').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? '✓ ' + fileName : '';
        });

        window.addEventListener('load', () => {
            console.log('页面加载完成，检查 Web3 环境...');
            console.log('window.ethereum:', typeof window.ethereum);

            if (typeof window.ethereum !== 'undefined') {
                window.ethereum.on('accountsChanged', (accounts) => {
                    console.log('账户已更改:', accounts);
                    if (accounts.length === 0) {
                        userAddress = null;
                        document.getElementById('walletStatus').textContent = '未连接';
                        document.getElementById('walletStatusIndicator').className = 'status-indicator status-disconnected';
                        document.getElementById('deployBtn').disabled = true;
                    } else {
                        userAddress = accounts[0];
                        updateWalletStatus();
                    }
                });

                window.ethereum.on('chainChanged', () => {
                    console.log('网络已更改，重新加载页面');
                    location.reload();
                });

                window.ethereum.on('disconnect', () => {
                    console.log('钱包已断开连接');
                    userAddress = null;
                    document.getElementById('walletStatus').textContent = '未连接';
                    document.getElementById('walletStatusIndicator').className = 'status-indicator status-disconnected';
                    document.getElementById('deployBtn').disabled = true;
                });
            } else {
                console.warn('未检测到 Web3 钱包');
                showAlert('未检测到 Web3 钱包，请安装 MetaMask 或其他钱包扩展', 'warning');
            }
        });
    </script>
</body>
</html>
