<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SouTaxToken 部署器</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --accent: #a855f7;
            --success: #10b981;
            --error: #ef4444;
            --dark-1: #030712;
            --dark-2: #0f172a;
            --dark-3: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(15, 23, 42, 0.65);
            --glass-heavy: rgba(15, 23, 42, 0.85);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--dark-1);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(3, 7, 18, 1) 100%);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wallet-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 18px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .wallet-info span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
            flex-shrink: 0;
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .wrapper {
            position: relative;
            z-index: 1;
            padding-top: 100px;
            flex: 1;
            padding-bottom: 40px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--glass-heavy);
            backdrop-filter: blur(40px);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        .card-content {
            padding: 32px;
        }

        .card-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            padding-left: 6px;
        }

        .input-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .input-box:focus-within {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        input,
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            outline: none;
            width: 100%;
            min-width: 0;
            font-family: inherit;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-tertiary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed var(--border);
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .file-input-label:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .file-name {
            color: var(--primary-light);
            font-weight: 600;
            margin-top: 8px;
            font-size: 13px;
        }

        .action-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: none;
            border-radius: 22px;
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .action-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .button-group .action-button {
            flex: 1;
            margin-top: 0;
        }

        .balance-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .balance-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .balance-label {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .balance-val {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            letter-spacing: -1.5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #toast-container {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            width: 90%;
            max-width: 420px;
        }

        .toast {
            padding: 16px 24px;
            border-radius: 20px;
            background: var(--glass-heavy);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            color: white;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .result-section {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 24px;
            border-radius: 20px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-family: 'Space Mono', monospace;
            word-break: break-all;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        @media (max-width: 600px) {
            .card-content {
                padding: 20px;
            }

            .card-title {
                font-size: 20px;
            }

            nav {
                padding: 12px 16px;
            }

            .wallet-info {
                font-size: 12px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav>
        <div class="logo-nav">🚀 SouTaxToken</div>
        <div class="nav-right">
            <div class="wallet-info" id="walletBtn" onclick="connectWallet()">
                <span class="status-dot" id="statusDot"></span>
                <span id="walletAddr">未连接</span>
            </div>
        </div>
    </nav>

    <div class="wrapper">
        <div class="app-container">
            <div class="card">
                <div class="card-content">
                    <div class="card-title">部署税收代币</div>
                    <div class="card-subtitle">通过 Flap 协议在 BSC 主网上部署</div>

                    <div class="balance-grid" id="balanceGrid">
                        <div class="balance-card">
                            <div class="balance-label">SOU 余额</div>
                            <div class="balance-val" id="souBalance">0.00</div>
                        </div>
                        <div class="balance-card">
                            <div class="balance-label">BNB 余额</div>
                            <div class="balance-val" id="bnbBalance">0.00</div>
                        </div>
                    </div>

                    <form id="deployForm">
                        <div class="form-group">
                            <div class="input-label">代币名称 *</div>
                            <div class="input-box">
                                <input type="text" id="tokenName" placeholder="例如：My Tax Token" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">代币符号 *</div>
                            <div class="input-box">
                                <input type="text" id="tokenSymbol" placeholder="例如：MTT" maxlength="10" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">代币描述 *</div>
                            <textarea id="tokenDescription" placeholder="描述您的代币的用途和特点" required></textarea>
                        </div>

                        <div class="form-group">
                            <div class="input-label">代币 Logo *</div>
                            <div class="file-input-wrapper">
                                <input type="file" id="tokenLogo" accept="image/png,image/jpeg,image/gif" required>
                                <label for="tokenLogo" class="file-input-label">
                                    📁 点击选择或拖拽 Logo 文件
                                </label>
                                <div class="file-name" id="fileName"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">官网 URL</div>
                            <div class="input-box">
                                <input type="text" id="website" placeholder="https://example.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">Twitter</div>
                            <div class="input-box">
                                <input type="text" id="twitter" placeholder="https://twitter.com/yourhandle">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">Telegram</div>
                            <div class="input-box">
                                <input type="text" id="telegram" placeholder="https://t.me/yourchannel">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">营销钱包地址 *</div>
                            <div class="input-box">
                                <input type="text" id="marketingWallet" placeholder="0xa819Eaf3f1d79E03a6D1001818889655532A9150" value="0xa819Eaf3f1d79E03a6D1001818889655532A9150" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-label">开发者份额 (BNB) *</div>
                            <div class="input-box">
                                <input type="number" id="devFee" placeholder="0.1" step="0.001" min="0.001" required>
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="submit" class="action-button" id="deployBtn" disabled>部署代币</button>
                        </div>
                    </form>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div class="loading-text" id="loadingText">处理中...</div>
                    </div>

                    <div class="result-section" id="resultSection">
                        <div class="result-item">
                            <div class="result-label">元数据 CID</div>
                            <div class="result-value" id="resultCid">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">计算的 Salt</div>
                            <div class="result-value" id="resultSalt">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">预期代币地址</div>
                            <div class="result-value" id="resultAddress">-</div>
                        </div>
                        <div class="result-item">
                            <div class="result-label">部署交易哈希</div>
                            <div class="result-value" id="resultTxHash">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const FLAP_UPLOAD_API = 'https://funcs.flap.sh/api/upload';
        const PORTAL_ADDRESS = '0xe2cE6ab80874Fa9Fa2aAE65D277Dd6B8e65C9De0';
        const TAX_TOKEN_V1_IMPL = '0x29e6383F0ce68507b5A72a53c2B118a118332aA8';
        const FACTORY_ADDRESS = '0x82768dCD5b4df30247A6B816a101c3D93a8a9779';
        const SOU_TOKEN_ADDRESS = '0xb65bD36fef84ebc5114Cfd803A4F25B2b57F7777';
        const SOU_FEE = ethers.utils.parseEther('10000');
        const BSC_CHAIN_ID = 56;

        const FACTORY_ABI = [
            'function deployNewToken(tuple(string name, string symbol, string meta, uint8 dexThresh, bytes32 salt, uint16 taxRate, uint8 migratorType, address quoteToken, uint256 quoteAmt, address beneficiary, bytes permitData, bytes32 extensionID, bytes extensionData, uint8 dexId, tuple(uint24 fee, int24 tickLower, int24 tickUpper) lpFeeProfile, uint64 taxDuration, uint64 antiFarmerDuration, uint16 mktBps, uint16 deflationBps, uint16 dividendBps, uint16 lpBps, uint256 minimumShareBalance) params) payable returns (address)'
        ];

        const SOU_ABI = [
            'function approve(address spender, uint256 amount) returns (bool)',
            'function balanceOf(address account) view returns (uint256)',
            'function allowance(address owner, address spender) view returns (uint256)'
        ];

        let provider, signer, userAddr;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function connectWallet() {
            try {
                if (!window.ethereum) {
                    showToast('请安装 MetaMask 或其他 Web3 钱包扩展', 'error');
                    return;
                }

                provider = new ethers.providers.Web3Provider(window.ethereum);
                const { chainId } = await provider.getNetwork();

                if (chainId !== BSC_CHAIN_ID) {
                    showToast('请切换到 BSC 主网（Chain ID: 56）', 'error');
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x38' }],
                        });
                        location.reload();
                    } catch (e) {
                        console.error('切换网络失败:', e);
                    }
                    return;
                }

                await window.ethereum.request({ method: 'eth_requestAccounts' });
                signer = provider.getSigner();
                userAddr = await signer.getAddress();

                document.getElementById('walletAddr').innerText = userAddr.substring(0, 6) + '...' + userAddr.substring(38);
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('deployBtn').disabled = false;

                await refreshUI();
                showToast('钱包已连接', 'success');
            } catch (error) {
                console.error('连接钱包错误:', error);
                showToast('连接钱包失败: ' + error.message, 'error');
            }
        }

        async function refreshUI() {
            if (!userAddr || !provider) return;

            try {
                const sou = new ethers.Contract(SOU_TOKEN_ADDRESS, SOU_ABI, provider);
                const souBalance = await sou.balanceOf(userAddr);
                document.getElementById('souBalance').innerText = ethers.utils.formatUnits(souBalance, 18);

                const bnbBalance = await provider.getBalance(userAddr);
                document.getElementById('bnbBalance').innerText = ethers.utils.formatUnits(bnbBalance, 18);
            } catch (e) {
                console.error('刷新 UI 失败:', e);
            }
        }

        async function uploadMetadata(file, name, symbol, description, website, twitter, telegram) {
            const formData = new FormData();

            const mutation = `
                mutation Create($file: Upload!, $meta: MetadataInput!) {
                    create(file: $file, meta: $meta)
                }
            `;

            formData.append('operations', JSON.stringify({
                query: mutation,
                variables: {
                    file: null,
                    meta: {
                        website: website || null,
                        twitter: twitter || null,
                        telegram: telegram || null,
                        description: description,
                        creator: '0x0000000000000000000000000000000000000000'
                    }
                }
            }));

            formData.append('map', JSON.stringify({
                '0': ['variables.file']
            }));

            formData.append('0', file);

            const response = await fetch(FLAP_UPLOAD_API, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`上传失败: ${response.statusText}`);
            }

            const data = await response.json();
            if (data.errors) {
                throw new Error(data.errors[0].message);
            }

            return data.data.create;
        }

        function predictTokenAddress(salt, tokenImpl, portal) {
            const bytecode = '0x3d602d80600a3d3981f3363d3d373d3d3d363d73' +
                tokenImpl.slice(2).toLowerCase() +
                '5af43d82803e903d91602b57fd5bf3';

            const hash = ethers.utils.solidityPack(
                ['bytes1', 'address', 'bytes32', 'bytes32'],
                ['0xff', portal, salt, ethers.utils.keccak256(bytecode)]
            );

            return '0x' + ethers.utils.keccak256(hash).slice(-40);
        }

        async function findVanitySalt(suffix = '7777') {
            let iterations = 0;
            let seed = ethers.utils.randomBytes(32);
            let salt = ethers.utils.keccak256(seed);

            while (!predictTokenAddress(salt, TAX_TOKEN_V1_IMPL, PORTAL_ADDRESS).endsWith(suffix)) {
                salt = ethers.utils.keccak256(salt);
                iterations++;
                if (iterations % 1000 === 0) {
                    document.getElementById('loadingText').textContent = `计算 Salt... (${iterations} 次迭代)`;
                }
            }

            return {
                salt,
                address: predictTokenAddress(salt, TAX_TOKEN_V1_IMPL, PORTAL_ADDRESS),
                iterations
            };
        }

        async function handleDeploy(e) {
            e.preventDefault();

            if (!userAddr) {
                showToast('请先连接钱包', 'error');
                return;
            }

            try {
                document.getElementById('deployForm').style.display = 'none';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('resultSection').classList.remove('show');

                const name = document.getElementById('tokenName').value;
                const symbol = document.getElementById('tokenSymbol').value;
                const description = document.getElementById('tokenDescription').value;
                const website = document.getElementById('website').value;
                const twitter = document.getElementById('twitter').value;
                const telegram = document.getElementById('telegram').value;
                const marketingWallet = document.getElementById('marketingWallet').value;
                const devFee = ethers.utils.parseEther(document.getElementById('devFee').value);
                const logoFile = document.getElementById('tokenLogo').files[0];

                if (!ethers.utils.isAddress(marketingWallet)) {
                    throw new Error('营销钱包地址无效');
                }

                document.getElementById('loadingText').textContent = '上传元数据到 IPFS...';
                const cid = await uploadMetadata(logoFile, name, symbol, description, website, twitter, telegram);

                document.getElementById('loadingText').textContent = '计算 Salt...';
                const { salt, address, iterations } = await findVanitySalt('7777');

                document.getElementById('loadingText').textContent = '检查 SOU 授权...';
                const souContract = new ethers.Contract(SOU_TOKEN_ADDRESS, SOU_ABI, signer);
                const allowance = await souContract.allowance(userAddr, FACTORY_ADDRESS);
                if (allowance.lt(SOU_FEE)) {
                    document.getElementById('loadingText').textContent = '授权 SOU 代币...';
                    const approveTx = await souContract.approve(FACTORY_ADDRESS, ethers.constants.MaxUint256);
                    await approveTx.wait();
                }

                document.getElementById('loadingText').textContent = '部署代币...';
                const factoryContract = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, signer);

                const params = {
                    name,
                    symbol,
                    meta: cid,
                    dexThresh: 1,
                    salt,
                    taxRate: 300,
                    migratorType: 2,
                    quoteToken: ethers.constants.AddressZero,
                    quoteAmt: 0,
                    beneficiary: marketingWallet,
                    permitData: '0x',
                    extensionID: ethers.constants.HashZero,
                    extensionData: '0x',
                    dexId: 1,
                    lpFeeProfile: {
                        fee: 0,
                        tickLower: 0,
                        tickUpper: 0
                    },
                    taxDuration: 0,
                    antiFarmerDuration: 0,
                    mktBps: 10000,
                    deflationBps: 0,
                    dividendBps: 0,
                    lpBps: 0,
                    minimumShareBalance: 0
                };

                const deployTx = await factoryContract.deployNewToken(params, { value: devFee });
                const receipt = await deployTx.wait();

                document.getElementById('resultCid').innerText = cid;
                document.getElementById('resultSalt').innerText = salt;
                document.getElementById('resultAddress').innerText = address;
                document.getElementById('resultTxHash').innerText = receipt.transactionHash;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultSection').classList.add('show');
                showToast('代币部署成功！', 'success');
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('deployForm').style.display = 'block';
                showToast('部署失败: ' + error.message, 'error');
                console.error(error);
            }
        }

        document.getElementById('deployForm').addEventListener('submit', handleDeploy);

        document.getElementById('tokenLogo').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? '✓ ' + fileName : '';
        });

        if (window.ethereum && window.ethereum.selectedAddress) {
            connectWallet();
        }

        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    userAddr = null;
                    document.getElementById('walletAddr').innerText = '未连接';
                    document.getElementById('statusDot').classList.remove('connected');
                    document.getElementById('deployBtn').disabled = true;
                } else {
                    userAddr = accounts[0];
                    connectWallet();
                }
            });

            window.ethereum.on('chainChanged', () => {
                location.reload();
            });
        }
    </script>
</body>
</html>
